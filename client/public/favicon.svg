<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Circle (Optional, remove if you want a transparent background) -->
  <circle cx="50" cy="50" r="48" fill="#F0F9F4" />

  <g transform="translate(0, 5)">
    <!-- Main Stem and Dirt Base -->
    <path d="M50,80 C50,65 52,50 46,35 C45,32 43,30 43,28" stroke="#2D6A4F" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M35,80 C45,78 55,78 65,80" stroke="#403D39" stroke-width="3" stroke-linecap="round" fill="none" />

    <!-- Left Leaf (Darker Green) -->
